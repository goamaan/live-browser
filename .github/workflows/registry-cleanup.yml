name: Registry Cleanup

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unpublish-legacy-packages:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify npm auth
        run: npm whoami

      - name: Unpublish legacy scoped packages
        shell: bash
        run: |
          set -euo pipefail

          packages=(
            "@goamaan/browser-bridge-sdk"
            "@goamaan/browser-bridge-core"
            "@goamaan/browser-bridge"
          )

          for pkg in "${packages[@]}"; do
            if ! npm view "${pkg}" version >/dev/null 2>&1; then
              echo "${pkg} is already gone."
              continue
            fi

            version="$(npm view "${pkg}" version)"
            echo "Unpublishing ${pkg}"

            success=false
            for attempt in 1 2 3; do
              if npm unpublish "${pkg}" --force; then
                success=true
                break
              fi

              if npm unpublish "${pkg}@${version}" --force; then
                success=true
                break
              fi

              echo "Attempt ${attempt} failed for ${pkg}; waiting for registry state to settle."
              sleep 15
            done

            if [ "${success}" != "true" ]; then
              echo "Failed to unpublish ${pkg}."
              exit 1
            fi
          done

      - name: Confirm removal
        shell: bash
        run: |
          set -euo pipefail

          packages=(
            "@goamaan/browser-bridge-sdk"
            "@goamaan/browser-bridge-core"
            "@goamaan/browser-bridge"
          )

          for pkg in "${packages[@]}"; do
            if npm view "${pkg}" version >/dev/null 2>&1; then
              echo "${pkg} still exists on npm."
              exit 1
            fi
            echo "${pkg} is gone."
          done
